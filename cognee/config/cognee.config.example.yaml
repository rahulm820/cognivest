# Cognee configuration — EXAMPLE (documentation only)
# ---------------------------------------------------------------------------
# ⚠️ Cognee does NOT read this YAML file. Its config is env-driven pydantic
# BaseSettings (docs/spike-cognee-1.2.2.md §3) — the real values live in
# `.env` (see ../../.env.example) and, in production, the secrets manager.
# This file exists purely to document the intended stack in one place; it
# mirrors the spike-verified configuration. Do NOT commit real credentials.
# The Cognee SDK is used only inside backend/src/memory/cognee_client.py
# (the single seam).
# ---------------------------------------------------------------------------

# Vector store: embeddings of every ingested chunk, namespaced per dataset.
vector_db:
  provider: lancedb            # lancedb | weaviate | qdrant  (env: COGNEE_VECTOR_DB_PROVIDER)
  # url: "http://weaviate:8080"      # for client/server providers
  # api_key: "${COGNEE_VECTOR_DB_API_KEY}"

# Graph store: entities + relationships, namespaced per dataset.
graph_db:
  provider: kuzu               # kuzu | neo4j  (env: COGNEE_GRAPH_DB_PROVIDER)
  # url: "bolt://neo4j:7687"         # for client/server providers
  # username: "neo4j"
  # password: "${COGNEE_GRAPH_DB_PASSWORD}"

# Embedding model used during cognify() to embed chunks (and queries at search time).
# Verified stack: local fastembed (ONNX, no API key, 384-dim).
embedding:
  provider: fastembed          # (env: EMBEDDING_PROVIDER)
  model: "sentence-transformers/all-MiniLM-L6-v2"  # (env: EMBEDDING_MODEL)
  dimensions: 384              # (env: EMBEDDING_DIMENSIONS) — MUST match the model

# LLM Cognee uses for extraction during cognify() AND for answer generation
# (completion search types). Single provider: Gemini via litellm.
llm:
  provider: gemini             # (env: LLM_PROVIDER)
  model: "gemini/gemini-2.5-flash"   # (env: LLM_MODEL) — litellm format
  # api_key: "${LLM_API_KEY}"

# On-disk data directory (git-ignored). NEVER commit dataset data.
data:
  data_dir: "/data/cognee"     # (env: COGNEE_DATA_DIR)

# Dataset naming convention — informational only; enforced in code at
# backend/src/memory/dataset_naming.py  ->  dataset_name(ticker) = f"company_{ticker}"
datasets:
  naming_pattern: "company_{ticker}"
  isolation: per_ticker        # never cross-query datasets
