# Alembic configuration for Cognivest backend.
# The database URL is injected at runtime from application settings
# (see src/database/migrations/env.py); the literal below is a placeholder
# and is intentionally NOT used for real connections.

[alembic]
script_location = src/database/migrations
prepend_sys_path = .
path_separator = os

# Overridden in env.py from settings.DATABASE_URL — do not rely on this value.
sqlalchemy.url = postgresql+asyncpg://cognivest:change_me@localhost:5432/cognivest

# Timestamped, descriptive migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]
hooks = black,ruff
black.type = console_scripts
black.entrypoint = black
black.options = -q
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
